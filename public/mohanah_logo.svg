<svg viewBox="0 0 700 400" xmlns="http://www.w3.org/2000/svg" style="border-radius:18px;">
  <defs>
    <linearGradient id="oliveBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3E4A2C"/>
      <stop offset="50%" style="stop-color:#4A5A32"/>
      <stop offset="100%" style="stop-color:#343D24"/>
    </linearGradient>
    <linearGradient id="roseGoldText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B4A52"/>
      <stop offset="25%" style="stop-color:#C9956C"/>
      <stop offset="50%" style="stop-color:#F2C4A0"/>
      <stop offset="75%" style="stop-color:#C9956C"/>
      <stop offset="100%" style="stop-color:#8B4A52"/>
    </linearGradient>
    <linearGradient id="copperGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7A4A2A"/>
      <stop offset="50%" style="stop-color:#CD8A5A"/>
      <stop offset="100%" style="stop-color:#7A4A2A"/>
    </linearGradient>
    <linearGradient id="creamGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F5E6D0"/>
      <stop offset="100%" style="stop-color:#E8D0B0"/>
    </linearGradient>
    <linearGradient id="mauveGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B07A8A"/>
      <stop offset="100%" style="stop-color:#8A5A6A"/>
    </linearGradient>
    <filter id="sketch">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" seed="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="sketchHeavy">
      <feTurbulence type="fractalNoise" baseFrequency="0.05" numOctaves="3" seed="5" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

